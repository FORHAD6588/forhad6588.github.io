<!DOCTYPE html>
<html>
<head>
<title>Flash Forhad</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:black;
text-align:center;
overflow-x:hidden;
}

/* Canvas */
canvas{position:fixed;top:0;left:0;z-index:-1}

/* Loader */
#loader{
position:fixed;width:100%;height:100%;
background:black;color:cyan;
display:flex;justify-content:center;align-items:center;
z-index:9999;font-size:20px;
}

/* Profile */
.profile{
width:140px;border-radius:50%;
border:3px solid cyan;
margin-top:20px;
box-shadow:0 0 20px cyan;
animation:float 3s infinite;
}

@keyframes float{
50%{transform:translateY(-10px)}
}

/* Typing */
#typing{color:cyan;font-weight:bold}

/* Terminal */
#terminal{
background:black;color:#00ff00;
padding:12px;margin:15px auto;
width:85%;border-radius:10px;
font-family:monospace;text-align:left;
box-shadow:0 0 10px #00ff00;
}

/* Skills */
.skill-bar{
width:80%;margin:10px auto;
background:#111;border-radius:20px;
overflow:hidden;
}
.skill-fill{height:10px;width:0;background:cyan}

/* Buttons */
.btn{
display:block;width:80%;
margin:10px auto;padding:10px;
border-radius:25px;
color:white;text-decoration:none;
transition:.3s;
}
.whatsapp{background:#25D366}
.telegram{background:#0088cc}
.facebook{background:#1877F2}
.instagram{background:linear-gradient(45deg,#feda75,#d62976)}
.tiktok{background:black;border:1px solid cyan}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 15px cyan;
}

/* Chat */
#chat{
position:fixed;bottom:15px;right:15px;
width:230px;background:black;
border:1px solid cyan;border-radius:10px;
}
#chat h4{background:cyan;color:black;margin:0;padding:5px}
#chat-body{height:120px;overflow:auto;padding:5px;text-align:left}
#chat input{width:100%;border:none;padding:6px}

/* Footer */
.footer{margin:20px;color:cyan}
</style>
</head>

<body>

<div id="loader">⚡ Booting...</div>
<canvas id="bg"></canvas>

<img src="20260212_100852.jpg" class="profile">

<h2>Flash Forhad ⚡</h2>
<p id="typing"></p>

<div id="terminal"></div>

<!-- Skills -->
Computer
<div class="skill-bar"><div id="s1" class="skill-fill"></div></div>

Social Media
<div class="skill-bar"><div id="s2" class="skill-fill"></div></div>

Cyber
<div class="skill-bar"><div id="s3" class="skill-fill"></div></div>

<!-- Buttons -->
<a class="btn whatsapp" href="https://wa.me/8801722201376">WhatsApp</a>
<a class="btn telegram" href="https://t.me/forhad6588">Telegram</a>
<a class="btn facebook" href="https://www.facebook.com/profile.php?id=61576404372835">Facebook</a>
<a class="btn instagram" href="https://www.instagram.com/itz_forhad_6588">Instagram</a>
<a class="btn tiktok" href="https://www.tiktok.com/@itzforhad2472">TikTok</a>

<div class="footer">⚡ Made by Flash Forhad</div>

<!-- Chat -->
<div id="chat">
<h4>FH Bot 💬</h4>
<div id="chat-body"></div>
<input id="chat-input" placeholder="Type..." />
</div>

<script>
// Loader
window.onload=()=>loader.style.display="none";

// Typing
let t="I don't follow, I lead 😎";
let i=0;
(function type(){
if(i<t.length){
typing.innerHTML+=t[i++];
setTimeout(type,50);
}})();

// Terminal
let txt=["System Ready ✔","Access Granted","Welcome Boss 😎"];
let l=0,c=0;
(function term(){
if(l<txt.length){
if(c<txt[l].length){
terminal.innerHTML+=txt[l][c++];
setTimeout(term,30);
}else{
terminal.innerHTML+="<br>";l++;c=0;
setTimeout(term,200);
}}})();

// Skills
setTimeout(()=>{
s1.style.width="40%";
s2.style.width="90%";
s3.style.width="20%";
},800);

// Particle
let c=document.getElementById("bg"),ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;
let p=[...Array(60)].map(()=>({
x:Math.random()*c.width,
y:Math.random()*c.height,
vx:1,vy:1
}));
(function draw(){
ctx.clearRect(0,0,c.width,c.height);
p.forEach(d=>{
ctx.fillStyle="cyan";
ctx.fillRect(d.x,d.y,2,2);
d.x+=d.vx;d.y+=d.vy;
if(d.x<0||d.x>c.width)d.vx*=-1;
if(d.y<0||d.y>c.height)d.vy*=-1;
});
requestAnimationFrame(draw);
})();

// Chat
chat-input.onkeypress=e=>{
if(e.key==="Enter"){
let v=e.target.value;
chat-body.innerHTML+=`<div>🧑 ${v}</div>`;
let r="🤖 Busy 😎";
if(v.includes("hi")) r="🤖 Hello Boss";
if(v.includes("name")) r="🤖 Flash Forhad Bot ⚡";
setTimeout(()=>{
chat-body.innerHTML+=`<div>${r}</div>`;
chat-body.scrollTop=9999;
},500);
e.target.value="";
}
};
</script>

</body>
</html>
